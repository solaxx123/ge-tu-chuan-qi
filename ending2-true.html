<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>结局二 · 真结局预览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:linear-gradient(180deg,#fff5f9,#ffe6f2);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .victory-container {
            width: 100%;
            max-width: 400px;
            margin: 10px auto;
            position: relative;
            z-index: 10;
        }
        .victory-box {
            background: linear-gradient(180deg, 
                rgba(255, 255, 255, 0.9) 0%, 
                rgba(255, 240, 245, 0.95) 50%,
                rgba(255, 228, 236, 0.95) 100%);
            backdrop-filter: blur(20px);
            padding: 45px 30px 35px;
            border-radius: 28px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 80px rgba(255, 107, 157, 0.25),
                0 20px 60px rgba(108, 92, 231, 0.2);
        }
        .victory-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, 
                transparent, 
                rgba(255, 182, 193, 0.15), 
                transparent,
                rgba(161, 140, 209, 0.15),
                transparent);
            animation: rotate 25s linear infinite;
            z-index: 0;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        .victory-content {
            position: relative;
            z-index: 1;
        }
        .victory-icon {
            font-size: 3.5rem;
            margin-bottom: 20px;
            animation: heartbeat 2s ease-in-out infinite;
        }
        .victory-title {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff6b9d 0%, #c44569 40%, #a18cd1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .victory-subtitle {
            color: rgba(196, 69, 105, 0.7);
            font-size: 0.85rem;
            letter-spacing: 3px;
            margin-bottom: 25px;
        }
        .divider {
            width: 70%;
            height: 1px;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 107, 157, 0.5), 
                transparent);
            margin: 0 auto 25px;
        }
        .victory-text {
            color: #8b4557;
            font-size: 1rem;
            line-height: 2;
            margin-bottom: 20px;
        }
        .victory-text .highlight {
            color: #ff6b9d;
            font-weight: bold;
        }
        .love-ending {
            margin-top: 10px;
            padding: 22px 18px;
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.12), rgba(161, 140, 209, 0.12));
            border-radius: 16px;
            border: 1px solid rgba(255, 107, 157, 0.3);
        }
        .love-text {
            font-size: 1.05rem;
            font-weight: 500;
            color: #c44569;
            line-height: 1.9;
        }
        .love-text .names {
            color: #ff6b9d;
            font-weight: bold;
            font-size: 1.15rem;
        }
        .couple-names {
            margin-top: 22px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #ff6b9d;
            letter-spacing: 2px;
        }
        .forever-text {
            color: rgba(196, 69, 105, 0.6);
            font-size: 0.8rem;
            margin-top: 8px;
            letter-spacing: 2px;
        }
        .victory-btn {
            margin-top: 28px;
            padding: 14px 45px;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
        }
        .victory-btn:active {
            transform: scale(0.97);
        }

.victory-box { margin: 0 auto; max-width: 420px; border-color: rgba(161,140,209,0.4) !important; }
body { background: linear-gradient(180deg, #0a0020, #1a0040, #0a0020); }
.preview-label {
  position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
  background: rgba(161,140,209,0.15); color: #a18cd1; font-size: 13px;
  padding: 6px 16px; border-radius: 20px; letter-spacing: 2px; z-index: 10;
  border: 1px solid rgba(161,140,209,0.3);
}
</style>
</head>
<body>
<div class="preview-label">📺 结局二 · 真结局（兔兔救出鸽鸽后）</div>
<div class="victory-container" style="width:100%;max-width:420px;">
  <div class="victory-box" style="border-color:rgba(161,140,209,0.4);">
    <div class="victory-content">
      <div class="victory-icon">🐰💕🕊️</div>
      <h1 class="victory-title" style="background:linear-gradient(135deg,#a18cd1,#ff6b9d,#a18cd1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">真爱永恒</h1>
      <div class="victory-subtitle">没有什么能阻挡真正的爱情</div>
      <div class="divider"></div>
      <div class="victory-text">
        兔兔用十把钥匙打开了地牢的大门<br>鸽鸽紧紧抱住了她
        <br><br><span class="highlight">"我就知道你会来。"</span>
        <br><br>两人连夜私奔，逃离了王国<br>在一个开满樱花的远方小村庄<br>过上了幸福快乐的生活
      </div>
      <div class="love-ending">
        <div class="love-text">
          国王后来气到跺脚，但没人理他。<br>魔龙呢？它改邪归正，<br>开了一家胡萝卜甜品店。
          <br><br>至于鸽鸽和兔兔——<br><span class="names">🕊️ 鸽鸽 & 兔兔 🐰</span><br>从此过上了幸福快乐的生活 💕
        </div>
      </div>
      <div class="couple-names">🕊️ 鸽鸽 & 兔兔 🐰</div>
      <div class="forever-text">真爱，值得所有的冒险</div>
      <button class="victory-btn" onclick="location.reload()">✨ 查看制作人员 ✨</button>
    </div>
  </div>
</div>
</body>
</html>
